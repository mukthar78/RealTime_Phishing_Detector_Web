<!DOCTYPE html>
<html lang="en">
<head>
    <title>Phishing URL Scanner</title>

    <style>

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #000);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            width: 500px;
            box-shadow: 0 0 25px rgba(0,255,255,0.2);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 20px;
            color: #00f7ff;
        }

        input {
            width: 90%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            outline: none;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(90deg, #00f7ff, #0077ff);
            color: white;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 10px rgba(0,255,255,0.1);
        }

        .safe {
            color: #00ff99;
            font-size: 22px;
            font-weight: bold;
        }

        .phishing {
            color: #ff4d4d;
            font-size: 22px;
            font-weight: bold;
        }

        .confidence {
            margin-top: 10px;
            font-size: 18px;
            color: #ccc;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="icon">🛡️</div>

        <h1>Real-Time Phishing URL Scanner</h1>

        <form method="POST">

            <input type="text" name="url" placeholder="Enter suspicious URL..." required>

            <br>

            <button type="submit">Scan Now</button>

        </form>

        {% if result %}

        <div class="result-box">

            {% if "Phishing" in result %}
                <div class="phishing">{{ result }}</div>
            {% else %}
                <div class="safe">{{ result }}</div>
            {% endif %}

            <div class="confidence">
                Confidence: {{ confidence }}%
            </div>

        </div>

        {% endif %}

    </div>

</body>
</html>
